<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <style>
    .report-bg { fill: #f8f9fa; }
    .report-text { font-family: Arial, sans-serif; fill: #333; }
    .report-title { font-size: 24px; font-weight: bold; }
    .report-detail { font-size: 16px; }
    .report-label { font-weight: bold; }
    .report-value { fill: #666; }
    .report-status { fill: #28a745; }
    .report-id { fill: #f90; }
    .report-severity { fill: #dc3545; }
  </style>
  
  <rect class="report-bg" x="0" y="0" width="800" height="400" rx="10"/>
  
  <g transform="translate(20, 40)">
    <text class="report-text report-title" x="0" y="0">Bug Bounty Report #2599826</text>
    
    <g transform="translate(0, 40)">
      <text class="report-text report-detail">
        <tspan x="0" y="0" class="report-label">Reported:</tspan>
        <tspan x="120" y="0" class="report-value">July 12, 2024, 6:27pm UTC</tspan>
      </text>
      
      <text class="report-text report-detail">
        <tspan x="0" y="30" class="report-label">Status:</tspan>
        <tspan x="120" y="30" class="report-status">Triaged (Open)</tspan>
      </text>
      
      <text class="report-text report-detail">
        <tspan x="0" y="60" class="report-label">Severity:</tspan>
        <tspan x="120" y="60" class="report-severity">Medium (4-6.9)</tspan>
      </text>
      
      <text class="report-text report-detail">
        <tspan x="0" y="90" class="report-label">Weakness:</tspan>
        <tspan x="120" y="90">SQL Injection</tspan>
      </text>
      
      <text class="report-text report-detail">
        <tspan x="0" y="120" class="report-label">Reported to:</tspan>
        <tspan x="120" y="120">U.S. Dept Of Defense</tspan>
      </text>
    </g>
  </g>
</svg>